name: GreenIndex

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installazione
        run: pip install ".[dev]"

      - name: Test
        run: pytest -q

      - name: Calcolo del GreenIndex (gate di qualità)
        # Analizza il codice del prodotto e fa fallire la build sotto soglia.
        run: greenindex analyze greenindex --min-score 70

      - name: Genera report HTML del GreenIndex
        if: always()
        run: greenindex analyze greenindex --quiet --html greenindex-report.html

      - name: Pubblica il report come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: greenindex-report
          path: greenindex-report.html
